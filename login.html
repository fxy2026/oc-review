<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 | 有机化学期中复习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d6b3d,#27ae60);font-family:'Segoe UI','Microsoft YaHei',sans-serif;}
.card{background:#fff;border-radius:16px;padding:40px 36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.icon{text-align:center;font-size:3em;margin-bottom:10px;}
h2{text-align:center;color:#0d6b3d;margin-bottom:4px;}
.hint{text-align:center;color:#999;font-size:.85em;margin-bottom:24px;}
label{display:block;font-size:.9em;color:#555;margin-bottom:4px;margin-top:14px;}
input{width:100%;padding:10px 12px;border:2px solid #d5e8d4;border-radius:8px;font-size:1em;transition:border-color .2s;}
input:focus{outline:none;border-color:#0d6b3d;}
button{width:100%;margin-top:20px;padding:12px;background:#0d6b3d;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold;transition:background .2s;}
button:hover{background:#27ae60;}
.err{color:#e74c3c;text-align:center;font-size:.85em;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="card">
<div class="icon">&#x1F9EA;</div>
<h2>有机化学期中复习</h2>
<p class="hint">输入访问码开始复习</p>
<label>昵称</label>
<input type="text" id="username" placeholder="你的名字" maxlength="20">
<label>访问码</label>
<input type="password" id="code" placeholder="输入访问码">
<button onclick="doLogin()">进入复习</button>
<div class="err" id="err">访问码错误，请重试</div>
</div>
<script>
var ACCESS_CODE = 'ochem2026';

// Auto-redirect if already logged in
try {
  var u = JSON.parse(localStorage.getItem('ochem_user'));
  if (u && u.username) window.location.href = 'index.html';
} catch(e){}

function doLogin() {
  var name = document.getElementById('username').value.trim();
  var code = document.getElementById('code').value.trim();
  if (!name) { document.getElementById('username').focus(); return; }
  if (code !== ACCESS_CODE) {
    document.getElementById('err').style.display = 'block';
    return;
  }
  localStorage.setItem('ochem_user', JSON.stringify({username: name, loginTime: Date.now()}));
  window.location.href = 'index.html';
}
document.getElementById('code').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
