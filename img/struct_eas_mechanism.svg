<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <style>
    line, path, polygon { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <defs>
    <marker id="arrEAS" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="black"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="red"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="130" y="22" font-size="15" font-weight="bold">Electrophilic Aromatic Substitution (EAS)</text>
  <!-- Step 1: Benzene -->
  <circle cx="80" cy="130" r="30" fill="none" stroke="black" stroke-width="2"/>
  <!-- Inner circle for aromaticity -->
  <circle cx="80" cy="130" r="17" fill="none" stroke="black" stroke-width="1"/>
  <text x="65" y="175" font-size="12">benzene</text>
  <!-- Plus E+ -->
  <text x="125" y="135" font-size="14">+</text>
  <text x="140" y="135" font-weight="bold" fill="red">E⁺</text>
  <!-- Arrow 1 -->
  <line x1="170" y1="130" x2="210" y2="130" marker-end="url(#arrEAS)"/>
  <text x="175" y="120" font-size="11">slow</text>
  <!-- Step 2: Sigma complex (arenium ion) -->
  <!-- Cyclohexadienyl cation - broken aromaticity -->
  <path d="M 240,110 L 265,100 L 290,110 L 290,145 L 265,155 L 240,145 Z" stroke="black" stroke-width="2" fill="none"/>
  <!-- Partial double bonds -->
  <line x1="245" y1="113" x2="262" y2="105" stroke="black" stroke-width="1.5"/>
  <line x1="287" y1="113" x2="270" y2="105" stroke="black" stroke-width="1.5"/>
  <!-- E attached to one carbon -->
  <line x1="265" y1="155" x2="265" y2="175"/>
  <text x="255" y="190" fill="red" font-weight="bold">E</text>
  <!-- H still on that carbon -->
  <line x1="265" y1="155" x2="280" y2="170"/>
  <text x="282" y="178" font-size="12">H</text>
  <!-- + charge delocalized -->
  <text x="255" y="95" fill="red" font-size="13">⁺</text>
  <!-- Resonance brackets -->
  <text x="225" y="130" font-size="18">[</text>
  <text x="298" y="130" font-size="18">]</text>
  <text x="303" y="115" font-size="11">⁺</text>
  <text x="233" y="210" font-size="11" fill="#555">σ complex (arenium ion)</text>
  <!-- Show charge delocalization -->
  <circle cx="245" cy="130" r="3" fill="red"/>
  <circle cx="290" cy="130" r="3" fill="red"/>
  <circle cx="265" cy="100" r="3" fill="red"/>
  <text x="230" y="225" font-size="10" fill="red">charge on ortho &amp; para</text>
  <!-- Arrow 2 -->
  <line x1="320" y1="130" x2="365" y2="130" marker-end="url(#arrEAS)"/>
  <text x="325" y="120" font-size="11">fast</text>
  <text x="325" y="148" font-size="11">−H⁺</text>
  <!-- Step 3: Product -->
  <circle cx="420" cy="130" r="30" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="420" cy="130" r="17" fill="none" stroke="black" stroke-width="1"/>
  <!-- E substituent on ring -->
  <line x1="420" y1="100" x2="420" y2="78"/>
  <text x="410" y="72" fill="red" font-weight="bold">E</text>
  <text x="400" y="175" font-size="12">product</text>
  <!-- Plus H+ leaving -->
  <text x="465" y="135" font-size="14">+</text>
  <text x="480" y="135">H⁺</text>
  <!-- Energy diagram sketch -->
  <text x="40" y="255" font-size="12" font-weight="bold">Key features:</text>
  <text x="40" y="275" font-size="12" fill="#555">• Step 1 (addition) is rate-determining → forms σ complex</text>
  <text x="40" y="293" font-size="12" fill="#555">• Step 2 (elimination of H⁺) restores aromaticity → fast</text>
</svg>