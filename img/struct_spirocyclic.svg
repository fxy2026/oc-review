<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .label { font-size: 12px; fill: #555; }
    .highlight { fill: #ff4444; }
  </style>
  <!-- Cyclopentane ring (left, 5-membered) -->
  <polygon points="170,140 145,100 175,65 215,80 210,125" fill="none" stroke="black" stroke-width="2"/>
  <!-- Cyclohexane ring (right, 6-membered) -->
  <polygon points="210,125 210,75 255,55 300,75 300,125 255,145" fill="none" stroke="black" stroke-width="2"/>
  <!-- Shared carbon highlight -->
  <circle cx="210" cy="100" r="12" fill="none" stroke="red" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Spiro carbon label -->
  <text x="220" y="105" class="highlight" font-weight="bold">spiro C</text>
  <!-- Numbering -->
  <text x="135" y="102" class="label">1</text>
  <text x="168" y="58" class="label">2</text>
  <text x="218" y="73" class="label">3</text>
  <text x="218" y="132" class="label">4</text>
  <text x="162" y="150" class="label">5(spiro)</text>
  <text x="253" y="48" class="label">6</text>
  <text x="305" y="73" class="label">7</text>
  <text x="305" y="132" class="label">8</text>
  <text x="253" y="155" class="label">9</text>
  <!-- Title -->
  <text x="150" y="200" font-size="16" font-weight="bold">Spiro[4.5]decane</text>
  <text x="120" y="225" font-size="13">Two rings share one carbon (spiro atom)</text>
  <!-- Arrow to spiro carbon -->
  <line x1="210" y1="112" x2="210" y2="125" stroke="red" stroke-width="1" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="red"/>
    </marker>
  </defs>
  <!-- Numbering start indicator -->
  <text x="120" y="250" font-size="12" fill="#555">Numbering: start at ring atom next to spiro, go through smaller ring first</text>
</svg>