<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .dashed { stroke-dasharray: 5,3; }
  </style>
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="200" y="22" font-size="15" font-weight="bold">S<tspan font-size="11" baseline-shift="sub">N</tspan>2 Mechanism</text>
  <!-- REACTANT (left) -->
  <!-- Nu approaching -->
  <text x="20" y="130" fill="blue" font-weight="bold">Nu:⁻</text>
  <!-- Arrow from Nu -->
  <line x1="58" y1="130" x2="85" y2="130" stroke="blue" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Central carbon -->
  <circle cx="110" cy="130" r="3" fill="black"/>
  <text x="103" y="120" font-size="12">C</text>
  <!-- Bonds from C to substituents -->
  <line x1="110" y1="130" x2="110" y2="90"/>
  <text x="105" y="83" font-size="12">H</text>
  <line x1="110" y1="130" x2="95" y2="155"/>
  <text x="83" y="168" font-size="12">H</text>
  <line x1="110" y1="130" x2="125" y2="155"/>
  <text x="125" y="168" font-size="12">H</text>
  <!-- C-LG bond -->
  <line x1="113" y1="130" x2="155" y2="130"/>
  <text x="158" y="135" fill="red">LG</text>
  <!-- Big arrow to TS -->
  <text x="185" y="135" font-size="20">→</text>
  <!-- TRANSITION STATE (middle) -->
  <text x="225" y="65" font-size="12">[</text>
  <!-- Nu---C---LG with dashed bonds -->
  <text x="220" y="130" fill="blue">Nu</text>
  <line x1="243" y1="130" x2="280" y2="130" class="dashed" stroke="blue"/>
  <!-- Central C of TS -->
  <circle cx="290" cy="130" r="3" fill="black"/>
  <!-- Dashed bond to LG -->
  <line x1="295" y1="130" x2="330" y2="130" class="dashed" stroke="red"/>
  <text x="333" y="135" fill="red">LG</text>
  <!-- Three H's in a plane (perpendicular) -->
  <line x1="290" y1="130" x2="290" y2="90"/>
  <text x="285" y="83" font-size="12">H</text>
  <line x1="290" y1="130" x2="270" y2="155"/>
  <text x="258" y="168" font-size="12">H</text>
  <line x1="290" y1="130" x2="310" y2="155"/>
  <text x="312" y="168" font-size="12">H</text>
  <!-- TS brackets and charge -->
  <text x="358" y="65" font-size="12">]‡</text>
  <text x="360" y="80" font-size="11" fill="#555">δ⁻...δ⁻</text>
  <text x="225" y="60" font-size="24">[</text>
  <text x="360" y="60" font-size="24">]</text>
  <!-- Pentacoordinate label -->
  <text x="245" y="190" font-size="11" fill="#555">pentacoordinate TS</text>
  <!-- Big arrow to product -->
  <text x="380" y="135" font-size="20">→</text>
  <!-- PRODUCT (right) -->
  <!-- Nu-C bond (now full) -->
  <text x="415" y="135" fill="blue">Nu</text>
  <line x1="437" y1="130" x2="470" y2="130"/>
  <!-- Central carbon -->
  <circle cx="475" cy="130" r="3" fill="black"/>
  <text x="468" y="120" font-size="12">C</text>
  <!-- H's now inverted -->
  <line x1="475" y1="130" x2="475" y2="170"/>
  <text x="470" y="183" font-size="12">H</text>
  <line x1="475" y1="130" x2="495" y2="110"/>
  <text x="497" y="105" font-size="12">H</text>
  <line x1="475" y1="130" x2="495" y2="150"/>
  <text x="497" y="155" font-size="12">H</text>
  <!-- Plus LG leaving -->
  <text x="520" y="135" font-size="14">+</text>
  <text x="535" y="135" fill="red">LG⁻</text>
  <!-- Inversion label -->
  <text x="430" y="220" font-size="13" fill="#333" font-weight="bold">Walden Inversion</text>
  <!-- Key features -->
  <text x="50" y="240" font-size="12" fill="#555">• One-step, concerted mechanism (bimolecular)</text>
  <text x="50" y="258" font-size="12" fill="#555">• Back-side attack → 100% inversion of configuration</text>
  <text x="50" y="276" font-size="12" fill="#555">• Rate = k[Nu⁻][substrate], favored by: primary C, strong Nu, polar aprotic solvent</text>
</svg>