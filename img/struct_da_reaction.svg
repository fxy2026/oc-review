<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <defs>
    <marker id="curveArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="red"/>
    </marker>
    <marker id="rxnArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="black"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="180" y="22" font-size="15" font-weight="bold">Diels-Alder Reaction [4+2]</text>
  <!-- 1,3-Butadiene in s-cis conformation -->
  <!-- C1=C2 -->
  <line x1="60" y1="150" x2="95" y2="120"/>
  <line x1="63" y1="145" x2="92" y2="118" stroke="black" stroke-width="1.5"/>
  <!-- C2-C3 -->
  <line x1="95" y1="120" x2="130" y2="150"/>
  <!-- C3=C4 -->
  <line x1="130" y1="150" x2="165" y2="120"/>
  <line x1="133" y1="145" x2="162" y2="118" stroke="black" stroke-width="1.5"/>
  <!-- Carbon dots -->
  <circle cx="60" cy="150" r="2.5" fill="black"/>
  <circle cx="95" cy="120" r="2.5" fill="black"/>
  <circle cx="130" cy="150" r="2.5" fill="black"/>
  <circle cx="165" cy="120" r="2.5" fill="black"/>
  <!-- Labels for diene -->
  <text x="80" y="175" font-size="12">diene (s-cis)</text>
  <!-- Plus sign -->
  <text x="185" y="140" font-size="18">+</text>
  <!-- Ethylene (dienophile) -->
  <line x1="220" y1="130" x2="265" y2="130"/>
  <line x1="220" y1="135" x2="265" y2="135" stroke="black" stroke-width="1.5"/>
  <circle cx="220" cy="132" r="2.5" fill="black"/>
  <circle cx="265" cy="132" r="2.5" fill="black"/>
  <text x="215" y="160" font-size="12">dienophile</text>
  <!-- Curved arrows showing electron flow -->
  <path d="M 65,148 C 55,125 85,100 93,118" fill="none" stroke="red" stroke-width="1.5" marker-end="url(#curveArrow)"/>
  <path d="M 133,148 C 150,130 200,125 218,130" fill="none" stroke="red" stroke-width="1.5" marker-end="url(#curveArrow)"/>
  <path d="M 240,128 C 220,108 175,105 167,118" fill="none" stroke="red" stroke-width="1.5" marker-end="url(#curveArrow)"/>
  <!-- Reaction arrow -->
  <line x1="290" y1="135" x2="350" y2="135" stroke="black" stroke-width="2" marker-end="url(#rxnArrow)"/>
  <text x="300" y="125" font-size="12">Δ or hν</text>
  <!-- Product: Cyclohexene -->
  <polygon points="400,100 440,80 480,100 480,150 440,170 400,150" fill="none" stroke="black" stroke-width="2"/>
  <!-- Double bond in cyclohexene (between C1-C2 equivalent) -->
  <line x1="405" y1="105" x2="435" y2="87" stroke="black" stroke-width="2"/>
  <!-- New sigma bonds highlighted -->
  <line x1="400" y1="150" x2="400" y2="100" stroke="green" stroke-width="2.5"/>
  <line x1="480" y1="150" x2="480" y2="100" stroke="green" stroke-width="2.5"/>
  <!-- Product label -->
  <text x="410" y="195" font-size="13">cyclohexene</text>
  <!-- Annotations -->
  <text x="490" y="110" font-size="11" fill="green">new σ bonds</text>
  <!-- Summary -->
  <text x="60" y="230" font-size="12" fill="#555">• [4π + 2π] cycloaddition, concerted pericyclic reaction</text>
  <text x="60" y="250" font-size="12" fill="#555">• Diene must be in s-cis conformation</text>
  <text x="60" y="270" font-size="12" fill="#555">• syn addition (suprafacial), stereospecific</text>
</svg>