<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <defs>
    <marker id="arrStab" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="green"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="160" y="25" font-size="15" font-weight="bold">Carbocation Stability Series</text>
  <!-- Stability arrow -->
  <line x1="30" y1="290" x2="570" y2="290" stroke="green" stroke-width="2.5" marker-end="url(#arrStab)"/>
  <text x="250" y="315" font-size="13" fill="green" font-weight="bold">Increasing Stability →</text>
  <!-- 1. Methyl cation (CH3+) -->
  <text x="25" y="70" font-size="12" font-weight="bold">methyl</text>
  <text x="30" y="130" font-size="16">CH₃⁺</text>
  <text x="25" y="155" font-size="11" fill="#555">no alkyl</text>
  <text x="25" y="170" font-size="11" fill="#555">groups</text>
  <!-- Less than -->
  <text x="95" y="130" font-size="20" fill="#888">&lt;</text>
  <!-- 2. Primary (RCH2+) -->
  <text x="115" y="70" font-size="12" font-weight="bold">1° primary</text>
  <text x="110" y="110" font-size="12">H  H</text>
  <text x="110" y="130" font-size="12"> \  | </text>
  <text x="115" y="145" font-size="14">R─C⁺</text>
  <text x="115" y="170" font-size="11" fill="#555">1 alkyl group</text>
  <!-- Less than -->
  <text x="190" y="130" font-size="20" fill="#888">&lt;</text>
  <!-- 3. Secondary (R2CH+) -->
  <text x="215" y="70" font-size="12" font-weight="bold">2° secondary</text>
  <text x="220" y="110" font-size="12">R   H</text>
  <text x="220" y="130" font-size="12"> \  |</text>
  <text x="215" y="145" font-size="14">R─C⁺</text>
  <text x="215" y="170" font-size="11" fill="#555">2 alkyl groups</text>
  <!-- Less than -->
  <text x="295" y="130" font-size="20" fill="#888">&lt;</text>
  <!-- 4. Tertiary (R3C+) -->
  <text x="320" y="70" font-size="12" font-weight="bold">3° tertiary</text>
  <text x="325" y="110" font-size="12">R   R</text>
  <text x="325" y="130" font-size="12"> \  |</text>
  <text x="320" y="145" font-size="14">R─C⁺</text>
  <text x="320" y="170" font-size="11" fill="#555">3 alkyl groups</text>
  <!-- Less than -->
  <text x="400" y="130" font-size="20" fill="#888">&lt;</text>
  <!-- 5. Allylic/Benzylic -->
  <text x="430" y="60" font-size="12" font-weight="bold">allylic /</text>
  <text x="430" y="76" font-size="12" font-weight="bold">benzylic</text>
  <!-- Allylic structure -->
  <text x="430" y="110" font-size="13">CH₂=CH─CH₂⁺</text>
  <text x="440" y="130" font-size="11" fill="#555">↕ resonance</text>
  <text x="430" y="148" font-size="13">⁺CH₂─CH=CH₂</text>
  <!-- Benzylic -->
  <circle cx="470" cy="200" r="16" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="470" cy="200" r="9" fill="none" stroke="black" stroke-width="1"/>
  <line x1="470" y1="216" x2="470" y2="235"/>
  <text x="460" y="250" font-size="12">CH₂⁺</text>
  <text x="430" y="270" font-size="11" fill="#555">resonance</text>
  <text x="430" y="283" font-size="11" fill="#555">stabilized</text>
  <!-- Explanation -->
  <text x="30" y="200" font-size="12" fill="#333">Stability factors:</text>
  <text x="30" y="218" font-size="11" fill="#555">• Hyperconjugation (σ→p donation from alkyl groups)</text>
  <text x="30" y="236" font-size="11" fill="#555">• Inductive effect (+I from alkyl groups)</text>
  <text x="30" y="254" font-size="11" fill="#555">• Resonance delocalization (allylic/benzylic)</text>
</svg>