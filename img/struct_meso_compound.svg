<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 320" width="450" height="320">
  <style>
    line { stroke: black; stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <!-- Title -->
  <text x="80" y="25" font-size="15" font-weight="bold">meso-Tartaric Acid (内消旋酒石酸)</text>
  <!-- Fischer projection of meso-tartaric acid -->
  <!-- Vertical chain -->
  <line x1="200" y1="60" x2="200" y2="260"/>
  <!-- Horizontal bonds at C2 -->
  <line x1="140" y1="120" x2="260" y2="120"/>
  <!-- Horizontal bonds at C3 -->
  <line x1="140" y1="200" x2="260" y2="200"/>
  <!-- Chiral center dots -->
  <circle cx="200" cy="120" r="3" fill="black"/>
  <circle cx="200" cy="200" r="3" fill="black"/>
  <!-- Top group: COOH -->
  <text x="180" y="52" font-size="13">COOH</text>
  <!-- Bottom group: COOH -->
  <text x="180" y="278" font-size="13">COOH</text>
  <!-- C2 substituents -->
  <text x="115" y="125" font-size="13">HO</text>
  <text x="265" y="125" font-size="13">H</text>
  <!-- C3 substituents -->
  <text x="125" y="205" font-size="13">H</text>
  <text x="265" y="205" font-size="13">OH</text>
  <!-- C labels -->
  <text x="208" y="115" font-size="11" fill="#555">C2 (R)</text>
  <text x="208" y="205" font-size="11" fill="#555">C3 (S)</text>
  <!-- Internal mirror plane -->
  <line x1="110" y1="160" x2="310" y2="160" stroke="red" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="315" y="165" font-size="12" fill="red">σ (mirror plane)</text>
  <!-- Mirror reflection arrows -->
  <path d="M 270,125 C 285,140 285,175 270,195" fill="none" stroke="red" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Annotations -->
  <text x="50" y="300" font-size="12" fill="#333">• Has 2 chiral centers but is achiral (optically inactive)</text>
  <text x="50" y="318" font-size="12" fill="#333">• Internal mirror plane: top half is mirror image of bottom half</text>
  <!-- R and S cancel -->
  <text x="320" y="120" font-size="12" fill="blue">R config</text>
  <text x="320" y="200" font-size="12" fill="blue">S config</text>
  <text x="340" y="160" font-size="12" fill="blue">cancel!</text>
</svg>