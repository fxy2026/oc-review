<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 280" width="550" height="280">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="blue"/>
    </marker>
    <marker id="arrowK" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="black"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="120" y="25" font-size="16" font-weight="bold">Bromonium Ion &amp; Anti Addition</text>
  <!-- Three-membered ring: Br+ at top, two C at bottom -->
  <!-- C-C bond -->
  <line x1="140" y1="160" x2="220" y2="160"/>
  <!-- C-Br bonds -->
  <line x1="140" y1="160" x2="180" y2="105"/>
  <line x1="220" y1="160" x2="180" y2="105"/>
  <!-- Br+ label -->
  <text x="165" y="95" font-weight="bold" fill="#8B0000">Br⁺</text>
  <!-- Carbon labels with H -->
  <text x="115" y="178">CH</text>
  <text x="215" y="178">CH</text>
  <!-- Substituents on carbons -->
  <line x1="140" y1="160" x2="110" y2="190"/>
  <text x="95" y="205" font-size="12">R</text>
  <line x1="220" y1="160" x2="250" y2="190"/>
  <text x="252" y="205" font-size="12">R'</text>
  <!-- Nucleophile attacking from back (anti) -->
  <text x="350" y="145" fill="blue" font-weight="bold">Nu:⁻</text>
  <path d="M 345,148 Q 310,155 235,160" fill="none" stroke="blue" stroke-width="2" marker-end="url(#arrowB)"/>
  <!-- Anti addition label -->
  <text x="290" y="125" font-size="12" fill="blue">back-side attack</text>
  <!-- Wedge/dash on product side -->
  <!-- Show the Br is on top (front face) -->
  <text x="155" y="75" font-size="11" fill="#555">front face blocked by Br⁺</text>
  <!-- Arrow showing anti -->
  <path d="M 350,170 L 350,200 L 310,200" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrowK)"/>
  <text x="310" y="220" font-size="12" fill="#555">attack opposite</text>
  <text x="310" y="235" font-size="12" fill="#555">side to Br⁺</text>
  <!-- Result annotation -->
  <text x="80" y="255" font-size="13" fill="#333">Result: anti addition → trans product (Br and Nu on opposite faces)</text>
  <!-- Positive charge delocalized -->
  <text x="80" y="275" font-size="12" fill="#555">δ⁺ on both carbons → nucleophile attacks more substituted C (Markovnikov)</text>
</svg>