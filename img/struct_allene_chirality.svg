<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <!-- Title -->
  <text x="120" y="25" font-size="15" font-weight="bold">Allene Axial Chirality</text>
  <!-- Central C=C=C axis -->
  <line x1="150" y1="150" x2="250" y2="150"/>
  <line x1="250" y1="150" x2="350" y2="150"/>
  <!-- Double bond indicators -->
  <line x1="155" y1="145" x2="245" y2="145"/>
  <line x1="255" y1="155" x2="345" y2="155"/>
  <!-- Carbon labels -->
  <text x="142" y="170" font-size="12">C1</text>
  <text x="245" y="170" font-size="12">C2</text>
  <text x="345" y="170" font-size="12">C3</text>
  <!-- Left carbon substituents (vertical plane) -->
  <line x1="150" y1="150" x2="120" y2="105"/>
  <text x="100" y="98" font-weight="bold" fill="blue">a</text>
  <line x1="150" y1="150" x2="120" y2="195"/>
  <text x="100" y="205" font-weight="bold" fill="red">b</text>
  <!-- Right carbon substituents (horizontal plane - perpendicular) -->
  <!-- Using wedge and dash to show perpendicular plane -->
  <polygon points="350,150 385,140 385,144" fill="black"/>
  <text x="388" y="145" font-weight="bold" fill="green">c</text>
  <line x1="350" y1="150" x2="385" y2="160" stroke-dasharray="3,2"/>
  <text x="388" y="168" font-weight="bold" fill="purple">d</text>
  <!-- Plane indicators -->
  <!-- Vertical plane (left) -->
  <rect x="110" y="90" width="55" height="120" fill="rgba(100,150,255,0.08)" stroke="blue" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="115" y="225" font-size="11" fill="blue">plane 1</text>
  <!-- Horizontal plane (right) - shown as ellipse from perspective -->
  <ellipse cx="365" cy="150" rx="30" ry="15" fill="rgba(100,255,100,0.08)" stroke="green" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="180" font-size="11" fill="green">plane 2</text>
  <!-- 90° angle indicator -->
  <text x="225" y="200" font-size="13" fill="#555">90° between planes</text>
  <!-- Perpendicular symbol -->
  <text x="235" y="140" font-size="16">⊥</text>
  <!-- Bottom explanation -->
  <text x="50" y="250" font-size="12" fill="#333">When a≠b and c≠d, the molecule is chiral (no σ plane)</text>
  <text x="50" y="270" font-size="12" fill="#333">Axial chirality: chirality axis along C=C=C</text>
  <text x="50" y="290" font-size="12" fill="#555">sp carbon (C2) has two π bonds in perpendicular planes</text>
</svg>