<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <style>
    line { stroke: black; stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .priority { font-size: 12px; font-weight: bold; fill: #cc0000; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#cc0000"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="170" y="25" font-size="16" font-weight="bold">R/S Configuration of 2-Bromobutane</text>
  <!-- R configuration (left) -->
  <text x="100" y="55" font-size="14" font-weight="bold">(R)-2-bromobutane</text>
  <!-- Chiral center -->
  <text x="120" y="145" font-size="13" font-weight="bold">C*</text>
  <circle cx="130" cy="140" r="2" fill="black"/>
  <!-- Bond to Br (up, wedge) - priority 1 -->
  <polygon points="130,138 125,95 135,95" fill="black" stroke="black" stroke-width="1"/>
  <text x="120" y="88" font-weight="bold">Br</text>
  <text x="140" y="88" class="priority">①</text>
  <!-- Bond to CH2CH3 (right) - priority 3 -->
  <line x1="135" y1="140" x2="195" y2="140"/>
  <text x="198" y="145">CH₂CH₃</text>
  <text x="198" y="160" class="priority">③</text>
  <!-- Bond to CH3 (left) - priority 4 (behind, dash) -->
  <line x1="125" y1="140" x2="75" y2="140" stroke-dasharray="4,3"/>
  <text x="45" y="145">CH₃</text>
  <text x="52" y="160" class="priority">④</text>
  <!-- Bond to H (down) - priority 4... actually H is lowest -->
  <line x1="130" y1="145" x2="130" y2="190"/>
  <text x="123" y="205">H</text>
  <text x="138" y="205" class="priority">④</text>
  <!-- Actually let me redo priorities: Br>CH2CH3>CH3>H = 1>2>3>4 -->
  <!-- Clockwise arrow for R -->
  <path d="M 125,85 A 45,45 0 1,1 185,135" fill="none" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="80" y="240" font-size="14" fill="#cc0000" font-weight="bold">Clockwise = R (rectus)</text>
  <!-- S configuration (right) -->
  <text x="370" y="55" font-size="14" font-weight="bold">(S)-2-bromobutane</text>
  <!-- Chiral center -->
  <circle cx="420" cy="140" r="2" fill="black"/>
  <!-- Bond to Br (up, wedge) - priority 1 -->
  <polygon points="420,138 415,95 425,95" fill="black" stroke="black" stroke-width="1"/>
  <text x="410" y="88" font-weight="bold">Br</text>
  <text x="430" y="88" class="priority">①</text>
  <!-- Bond to CH3 (right) - priority 3 -->
  <line x1="425" y1="140" x2="485" y2="140"/>
  <text x="488" y="145">CH₃</text>
  <text x="488" y="160" class="priority">③</text>
  <!-- Bond to CH2CH3 (left) - priority 2 -->
  <line x1="415" y1="140" x2="345" y2="140"/>
  <text x="305" y="145">CH₂CH₃</text>
  <text x="318" y="160" class="priority">②</text>
  <!-- Bond to H (down, dash - behind plane) -->
  <line x1="420" y1="145" x2="420" y2="190" stroke-dasharray="4,3"/>
  <text x="413" y="205">H</text>
  <text x="428" y="205" class="priority">④</text>
  <!-- Counterclockwise arrow for S -->
  <path d="M 475,135 A 45,45 0 1,1 415,85" fill="none" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="240" font-size="14" fill="#cc0000" font-weight="bold">Counterclockwise = S (sinister)</text>
  <!-- CIP priority note -->
  <text x="100" y="280" font-size="12" fill="#555">CIP Priority: Br(35) > C₂H₅(C,H,H at first point) > CH₃(H,H,H) > H(1)</text>
  <text x="100" y="300" font-size="12" fill="#555">Note: lowest priority (④) must point away from viewer (dashed bond)</text>
</svg>