<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 320" width="550" height="320">
  <style>
    line { stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; }
    .axial { stroke: red; }
    .equatorial { stroke: blue; }
  </style>
  <!-- Chair conformation skeleton -->
  <line x1="120" y1="160" x2="180" y2="200" stroke="black" stroke-width="2"/>
  <line x1="180" y1="200" x2="280" y2="200" stroke="black" stroke-width="2"/>
  <line x1="280" y1="200" x2="320" y2="160" stroke="black" stroke-width="2"/>
  <line x1="320" y1="160" x2="260" y2="120" stroke="black" stroke-width="2"/>
  <line x1="260" y1="120" x2="160" y2="120" stroke="black" stroke-width="2"/>
  <line x1="160" y1="120" x2="120" y2="160" stroke="black" stroke-width="2"/>
  <!-- Carbon dots -->
  <circle cx="120" cy="160" r="3" fill="black"/>
  <circle cx="180" cy="200" r="3" fill="black"/>
  <circle cx="280" cy="200" r="3" fill="black"/>
  <circle cx="320" cy="160" r="3" fill="black"/>
  <circle cx="260" cy="120" r="3" fill="black"/>
  <circle cx="160" cy="120" r="3" fill="black"/>
  <!-- Axial bonds (vertical, red) - alternating up/down -->
  <!-- C1 (top-left) axial UP -->
  <line x1="120" y1="160" x2="120" y2="125" class="axial"/>
  <!-- C2 (bottom-left) axial DOWN -->
  <line x1="180" y1="200" x2="180" y2="235" class="axial"/>
  <!-- C3 (bottom-right) axial UP -->
  <line x1="280" y1="200" x2="280" y2="165" class="axial"/>
  <!-- C4 (top-right) axial DOWN -->
  <line x1="320" y1="160" x2="320" y2="195" class="axial"/>
  <!-- C5 (far top-right) axial UP -->
  <line x1="260" y1="120" x2="260" y2="85" class="axial"/>
  <!-- C6 (far top-left) axial DOWN -->
  <line x1="160" y1="120" x2="160" y2="155" class="axial"/>
  <!-- Equatorial bonds (angled, blue) -->
  <!-- C1 equatorial -->
  <line x1="120" y1="160" x2="95" y2="175" class="equatorial"/>
  <!-- C2 equatorial -->
  <line x1="180" y1="200" x2="160" y2="215" class="equatorial"/>
  <!-- C3 equatorial -->
  <line x1="280" y1="200" x2="305" y2="185" class="equatorial"/>
  <!-- C4 equatorial -->
  <line x1="320" y1="160" x2="345" y2="145" class="equatorial"/>
  <!-- C5 equatorial -->
  <line x1="260" y1="120" x2="285" y2="105" class="equatorial"/>
  <!-- C6 equatorial -->
  <line x1="160" y1="120" x2="135" y2="105" class="equatorial"/>
  <!-- Labels -->
  <text x="112" y="118" fill="red" font-size="12">a</text>
  <text x="172" y="252" fill="red" font-size="12">a</text>
  <text x="272" y="160" fill="red" font-size="12">a</text>
  <text x="322" y="210" fill="red" font-size="12">a</text>
  <text x="252" y="80" fill="red" font-size="12">a</text>
  <text x="152" y="168" fill="red" font-size="12">a</text>
  <text x="75" y="182" fill="blue" font-size="12">e</text>
  <text x="145" y="228" fill="blue" font-size="12">e</text>
  <text x="308" y="182" fill="blue" font-size="12">e</text>
  <text x="348" y="140" fill="blue" font-size="12">e</text>
  <text x="290" y="100" fill="blue" font-size="12">e</text>
  <text x="118" y="100" fill="blue" font-size="12">e</text>
  <!-- Legend -->
  <line x1="380" y1="100" x2="410" y2="100" stroke="red" stroke-width="2"/>
  <text x="415" y="105" fill="red" font-size="13">= axial (a) vertical</text>
  <line x1="380" y1="125" x2="410" y2="125" stroke="blue" stroke-width="2"/>
  <text x="415" y="130" fill="blue" font-size="13">= equatorial (e) angled</text>
  <!-- Title -->
  <text x="140" y="290" font-size="16" font-weight="bold" fill="black">Cyclohexane Chair Conformation</text>
  <text x="130" y="310" font-size="12" fill="#555">Axial bonds alternate up/down; equatorial bonds angle away from ring</text>
</svg>