<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .orbital { stroke: #0066cc; stroke-width: 1.5; fill: rgba(0,100,200,0.1); }
  </style>
  <!-- Title -->
  <text x="180" y="22" font-size="15" font-weight="bold">Types of Conjugation</text>
  <!-- (a) π-π Conjugation: 1,3-butadiene -->
  <text x="30" y="55" font-weight="bold">(a) π-π conjugation</text>
  <text x="30" y="72" font-size="12" fill="#555">1,3-丁二烯 (1,3-butadiene)</text>
  <!-- C=C-C=C structure -->
  <line x1="40" y1="120" x2="80" y2="100"/>
  <line x1="44" y1="123" x2="78" y2="105"/>
  <line x1="80" y1="100" x2="120" y2="120"/>
  <line x1="120" y1="120" x2="160" y2="100"/>
  <line x1="124" y1="123" x2="158" y2="105"/>
  <!-- p orbitals above -->
  <ellipse cx="40" cy="85" rx="8" ry="18" class="orbital"/>
  <ellipse cx="80" cy="85" rx="8" ry="18" class="orbital"/>
  <ellipse cx="120" cy="85" rx="8" ry="18" class="orbital"/>
  <ellipse cx="160" cy="85" rx="8" ry="18" class="orbital"/>
  <!-- Overlap indicator -->
  <path d="M 48,85 L 72,85" stroke="red" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M 88,85 L 112,85" stroke="red" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M 128,85 L 152,85" stroke="red" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="40" y="145" font-size="11" fill="#555">4 parallel p orbitals overlap</text>
  <!-- (b) p-π Conjugation: allyl cation -->
  <text x="210" y="55" font-weight="bold">(b) p-π conjugation</text>
  <text x="210" y="72" font-size="12" fill="#555">烯丙基正离子 (allyl cation)</text>
  <!-- C=C-C+ structure -->
  <line x1="220" y1="120" x2="260" y2="100"/>
  <line x1="224" y1="123" x2="258" y2="105"/>
  <line x1="260" y1="100" x2="300" y2="120"/>
  <!-- C+ label -->
  <text x="295" y="135" fill="red" font-size="13">⁺</text>
  <!-- p orbitals -->
  <ellipse cx="220" cy="85" rx="8" ry="18" class="orbital"/>
  <ellipse cx="260" cy="85" rx="8" ry="18" class="orbital"/>
  <ellipse cx="300" cy="85" rx="8" ry="18" fill="rgba(255,0,0,0.08)" stroke="red" stroke-width="1.5"/>
  <!-- Empty p orbital label -->
  <text x="285" y="63" font-size="11" fill="red">empty p</text>
  <!-- Overlap -->
  <path d="M 228,85 L 252,85" stroke="red" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M 268,85 L 292,85" stroke="red" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="215" y="145" font-size="11" fill="#555">empty p overlaps with π bond</text>
  <!-- (c) Hyperconjugation: propene -->
  <text x="400" y="55" font-weight="bold">(c) σ-π hyperconjugation</text>
  <text x="400" y="72" font-size="12" fill="#555">丙烯 (propene)</text>
  <!-- CH3-CH=CH2 -->
  <line x1="410" y1="120" x2="450" y2="100"/>
  <line x1="450" y1="100" x2="490" y2="120"/>
  <line x1="454" y1="103" x2="488" y2="117"/>
  <line x1="490" y1="120" x2="530" y2="100"/>
  <!-- C-H bond (sigma) shown with orbital -->
  <line x1="410" y1="120" x2="390" y2="140" stroke="#009900" stroke-width="2"/>
  <text x="378" y="155" font-size="12" fill="#009900">H</text>
  <!-- σ orbital lobe -->
  <ellipse cx="400" cy="130" rx="12" ry="6" fill="rgba(0,150,0,0.1)" stroke="#009900" stroke-width="1.5" transform="rotate(-45,400,130)"/>
  <!-- π orbital -->
  <ellipse cx="470" cy="85" rx="8" ry="18" class="orbital"/>
  <!-- σ-π overlap indicator -->
  <path d="M 415,115 C 430,95 450,90 462,87" stroke="red" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="400" y="145" font-size="11" fill="#555">C-H σ bond parallel to p orbital</text>
  <!-- Summary at bottom -->
  <rect x="20" y="170" width="560" height="160" fill="none" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="40" y="195" font-size="13" font-weight="bold">Comparison:</text>
  <text x="40" y="218" font-size="12">(a) π-π: adjacent π bonds conjugate → delocalized π system, stabilization</text>
  <text x="40" y="240" font-size="12">(b) p-π: empty/filled p orbital conjugates with adjacent π → charge delocalization</text>
  <text x="40" y="262" font-size="12">(c) σ-π: σ bond (anti-periplanar to p orbital) donates electron density to π*</text>
  <text x="40" y="290" font-size="12" fill="#555">Stabilization: π-π > p-π > hyperconjugation</text>
  <text x="40" y="312" font-size="12" fill="#555">All require parallel orbital alignment for overlap</text>
</svg>