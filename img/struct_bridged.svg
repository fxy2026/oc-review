<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300" width="450" height="300">
  <style>
    line, path, polygon { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .label { font-size: 12px; fill: #555; }
  </style>
  <!-- Norbornane (bicyclo[2.2.1]heptane) 3D perspective -->
  <!-- Front bottom edge (C2-C3) -->
  <line x1="140" y1="200" x2="260" y2="200"/>
  <!-- Left front edge (C1-C2) -->
  <line x1="100" y1="140" x2="140" y2="200"/>
  <!-- Right front edge (C3-C4) -->
  <line x1="260" y1="200" x2="300" y2="140"/>
  <!-- Left back edge (C1-C6) -->
  <line x1="100" y1="140" x2="160" y2="100"/>
  <!-- Right back edge (C4-C5) -->
  <line x1="300" y1="140" x2="240" y2="100"/>
  <!-- Back bottom edge (C5-C6) -->
  <line x1="160" y1="100" x2="240" y2="100"/>
  <!-- Bridge (C1-C7-C4) -->
  <line x1="100" y1="140" x2="200" y2="55"/>
  <line x1="300" y1="140" x2="200" y2="55"/>
  <!-- Carbon labels -->
  <text x="85" y="138" font-weight="bold">C1</text>
  <text x="125" y="218" class="label">C2</text>
  <text x="262" y="218" class="label">C3</text>
  <text x="303" y="138" font-weight="bold">C4</text>
  <text x="242" y="95" class="label">C5</text>
  <text x="140" y="95" class="label">C6</text>
  <text x="190" y="48" class="label" fill="red">C7 (bridge)</text>
  <!-- Bridgehead labels -->
  <circle cx="100" cy="140" r="4" fill="black"/>
  <circle cx="300" cy="140" r="4" fill="black"/>
  <circle cx="200" cy="55" r="4" fill="black"/>
  <circle cx="140" cy="200" r="4" fill="black"/>
  <circle cx="260" cy="200" r="4" fill="black"/>
  <circle cx="160" cy="100" r="4" fill="black"/>
  <circle cx="240" cy="100" r="4" fill="black"/>
  <!-- Title -->
  <text x="100" y="260" font-size="16" font-weight="bold">Bicyclo[2.2.1]heptane (Norbornane)</text>
  <text x="100" y="282" font-size="12" fill="#555">Bridgeheads: C1, C4 | Bridge: C7 | [2.2.1] = carbons in each bridge</text>
</svg>