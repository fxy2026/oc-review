<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <style>
    line { stroke: black; stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .box { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 3,2; }
  </style>
  <!-- Title -->
  <text x="140" y="22" font-size="15" font-weight="bold">Fischer Projection Operations</text>
  <!-- (a) 180° rotation = same compound -->
  <rect x="10" y="35" width="270" height="130" class="box" rx="4"/>
  <text x="20" y="55" font-weight="bold">(a) 180° rotation = SAME</text>
  <!-- Original -->
  <line x1="70" y1="100" x2="70" y2="140"/>
  <line x1="45" y1="120" x2="95" y2="120"/>
  <text x="63" y="93">A</text>
  <text x="63" y="155">C</text>
  <text x="30" y="125">B</text>
  <text x="98" y="125">D</text>
  <circle cx="70" cy="120" r="3" fill="black"/>
  <!-- Arrow -->
  <text x="115" y="120" font-size="12">180°→</text>
  <!-- Rotated -->
  <line x1="200" y1="100" x2="200" y2="140"/>
  <line x1="175" y1="120" x2="225" y2="120"/>
  <text x="193" y="93">C</text>
  <text x="193" y="155">A</text>
  <text x="160" y="125">D</text>
  <text x="228" y="125">B</text>
  <circle cx="200" cy="120" r="3" fill="black"/>
  <text x="235" y="120" font-size="12" fill="green">= same</text>
  <!-- (b) 90° rotation = enantiomer -->
  <rect x="295" y="35" width="290" height="130" class="box" rx="4"/>
  <text x="305" y="55" font-weight="bold">(b) 90° rotation = ENANTIOMER</text>
  <!-- Original -->
  <line x1="360" y1="100" x2="360" y2="140"/>
  <line x1="335" y1="120" x2="385" y2="120"/>
  <text x="353" y="93">A</text>
  <text x="353" y="155">C</text>
  <text x="320" y="125">B</text>
  <text x="388" y="125">D</text>
  <circle cx="360" cy="120" r="3" fill="black"/>
  <!-- Arrow -->
  <text x="405" y="120" font-size="12">90°→</text>
  <!-- Rotated 90° -->
  <line x1="495" y1="100" x2="495" y2="140"/>
  <line x1="470" y1="120" x2="520" y2="120"/>
  <text x="488" y="93">B</text>
  <text x="488" y="155">D</text>
  <text x="455" y="125">C</text>
  <text x="523" y="125">A</text>
  <circle cx="495" cy="120" r="3" fill="black"/>
  <text x="535" y="120" font-size="12" fill="red">≠ enantiomer</text>
  <!-- (c) One swap = enantiomer -->
  <rect x="10" y="180" width="270" height="130" class="box" rx="4"/>
  <text x="20" y="200" font-weight="bold">(c) 1 swap = ENANTIOMER</text>
  <!-- Original -->
  <line x1="70" y1="245" x2="70" y2="285"/>
  <line x1="45" y1="265" x2="95" y2="265"/>
  <text x="63" y="238">A</text>
  <text x="63" y="300">C</text>
  <text x="30" y="270">B</text>
  <text x="98" y="270">D</text>
  <circle cx="70" cy="265" r="3" fill="black"/>
  <!-- Swap arrow -->
  <text x="110" y="265" font-size="12">swap→</text>
  <text x="110" y="280" font-size="11">B↔D</text>
  <!-- After swap -->
  <line x1="200" y1="245" x2="200" y2="285"/>
  <line x1="175" y1="265" x2="225" y2="265"/>
  <text x="193" y="238">A</text>
  <text x="193" y="300">C</text>
  <text x="160" y="270">D</text>
  <text x="228" y="270">B</text>
  <circle cx="200" cy="265" r="3" fill="black"/>
  <text x="235" y="265" font-size="12" fill="red">≠ enantiomer</text>
  <!-- (d) Two swaps = same -->
  <rect x="295" y="180" width="290" height="130" class="box" rx="4"/>
  <text x="305" y="200" font-weight="bold">(d) 2 swaps = SAME</text>
  <!-- Original -->
  <line x1="360" y1="245" x2="360" y2="285"/>
  <line x1="335" y1="265" x2="385" y2="265"/>
  <text x="353" y="238">A</text>
  <text x="353" y="300">C</text>
  <text x="320" y="270">B</text>
  <text x="388" y="270">D</text>
  <circle cx="360" cy="265" r="3" fill="black"/>
  <!-- Two swaps -->
  <text x="400" y="258" font-size="11">swap B↔D</text>
  <text x="400" y="275" font-size="11">then A↔C</text>
  <text x="400" y="265" font-size="12">→</text>
  <!-- After 2 swaps -->
  <line x1="495" y1="245" x2="495" y2="285"/>
  <line x1="470" y1="265" x2="520" y2="265"/>
  <text x="488" y="238">C</text>
  <text x="488" y="300">A</text>
  <text x="455" y="270">D</text>
  <text x="523" y="270">B</text>
  <circle cx="495" cy="265" r="3" fill="black"/>
  <text x="535" y="265" font-size="12" fill="green">= same</text>
  <!-- Summary -->
  <text x="50" y="335" font-size="12" fill="#555">Rule: even number of exchanges = same; odd number = enantiomer; 180° = same; 90° = enantiomer</text>
</svg>