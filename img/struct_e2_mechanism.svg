<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 330" width="600" height="330">
  <style>
    line, path { stroke: black; stroke-width: 2; fill: none; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <defs>
    <marker id="arrE2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="black"/>
    </marker>
    <marker id="arrE2r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="red"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="220" y="22" font-size="15" font-weight="bold">E2 Mechanism</text>
  <!-- Sawhorse/wedge-dash view showing anti-periplanar -->
  <text x="30" y="50" font-weight="bold">Anti-periplanar arrangement:</text>
  <!-- Central C-C bond -->
  <line x1="100" y1="140" x2="180" y2="120"/>
  <!-- Alpha carbon (has LG) -->
  <circle cx="180" cy="120" r="3" fill="black"/>
  <text x="185" y="115" font-size="11">Cα</text>
  <!-- Beta carbon (has H) -->
  <circle cx="100" cy="140" r="3" fill="black"/>
  <text x="75" y="135" font-size="11">Cβ</text>
  <!-- H on beta carbon (anti to LG) -->
  <line x1="100" y1="140" x2="70" y2="165"/>
  <text x="55" y="178" font-weight="bold">H</text>
  <!-- LG on alpha carbon (anti to H) -->
  <line x1="180" y1="120" x2="215" y2="95"/>
  <text x="218" y="92" font-weight="bold" fill="red">LG</text>
  <!-- Other substituents -->
  <line x1="100" y1="140" x2="80" y2="115"/>
  <text x="68" y="110" font-size="11">R₁</text>
  <line x1="100" y1="140" x2="115" y2="170"/>
  <text x="115" y="183" font-size="11">R₂</text>
  <line x1="180" y1="120" x2="195" y2="145"/>
  <text x="198" y="155" font-size="11">R₃</text>
  <line x1="180" y1="120" x2="170" y2="92"/>
  <text x="160" y="86" font-size="11">R₄</text>
  <!-- Base attacking H -->
  <text x="15" y="205" fill="blue" font-weight="bold">B:⁻</text>
  <path d="M 35,198 C 45,190 55,180 63,172" fill="none" stroke="blue" stroke-width="1.5" marker-end="url(#arrE2r)"/>
  <!-- Curved arrow: C-H bond breaking -->
  <path d="M 85,160 C 95,155 100,150 110,143" fill="none" stroke="red" stroke-width="1.5" marker-end="url(#arrE2r)"/>
  <!-- Curved arrow: C-LG bond breaking -->
  <path d="M 185,118 C 195,110 205,100 212,96" fill="none" stroke="red" stroke-width="1.5" marker-end="url(#arrE2r)"/>
  <!-- 180° label -->
  <text x="120" y="90" font-size="12" fill="#555">H and LG: 180° (anti)</text>
  <!-- NEWMAN PROJECTION VIEW (right side) -->
  <text x="330" y="50" font-weight="bold">Newman projection view:</text>
  <!-- Back carbon circle -->
  <circle cx="430" cy="140" r="40" fill="white" stroke="black" stroke-width="2"/>
  <!-- Front carbon dot -->
  <circle cx="430" cy="140" r="3" fill="black"/>
  <!-- Front bonds (from center) - beta carbon -->
  <line x1="430" y1="140" x2="430" y2="88"/>
  <text x="420" y="80" font-weight="bold">H</text>
  <line x1="430" y1="140" x2="475" y2="167"/>
  <text x="478" y="177" font-size="12">R₁</text>
  <line x1="430" y1="140" x2="385" y2="167"/>
  <text x="368" y="177" font-size="12">R₂</text>
  <!-- Back bonds (from circle edge) - alpha carbon, 180° from H for LG -->
  <line x1="430" y1="180" x2="430" y2="200"/>
  <text x="418" y="215" font-weight="bold" fill="red">LG</text>
  <line x1="450" y1="103" x2="462" y2="88"/>
  <text x="464" y="85" font-size="12">R₃</text>
  <line x1="410" y1="103" x2="398" y2="88"/>
  <text x="383" y="85" font-size="12">R₄</text>
  <!-- 180° indicator -->
  <path d="M 435,92 A 5,5 0 0,1 435,195" fill="none" stroke="red" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="440" y="145" font-size="11" fill="red">180°</text>
  <!-- Anti-periplanar label -->
  <text x="380" y="235" font-size="12" fill="#555">H and LG are anti-periplanar</text>
  <!-- Products -->
  <text x="50" y="250" font-weight="bold">Products:</text>
  <!-- Alkene product -->
  <line x1="80" y1="285" x2="120" y2="285"/>
  <line x1="80" y1="290" x2="120" y2="290"/>
  <text x="55" y="292" font-size="12">C=C</text>
  <text x="140" y="292" font-size="13">+ B-H + LG⁻</text>
  <!-- Features -->
  <text x="50" y="320" font-size="12" fill="#555">E2: one-step, concerted, anti-periplanar required, bimolecular, rate = k[B⁻][RX]</text>
</svg>