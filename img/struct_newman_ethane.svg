<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <style>
    line { stroke: black; stroke-width: 2; }
    circle { stroke: black; stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
  </style>
  <!-- STAGGERED (left) -->
  <!-- Back carbon circle -->
  <circle cx="150" cy="130" r="40" fill="white"/>
  <!-- Front carbon bonds (from center, 120° apart) -->
  <line x1="150" y1="130" x2="150" y2="75"/>
  <line x1="150" y1="130" x2="197" y2="157"/>
  <line x1="150" y1="130" x2="103" y2="157"/>
  <!-- Back carbon bonds (from circle edge, 120° apart, staggered 60° from front) -->
  <line x1="170" y1="93" x2="185" y2="72"/>
  <line x1="130" y1="93" x2="115" y2="72"/>
  <line x1="150" y1="170" x2="150" y2="192"/>
  <!-- H labels - front -->
  <text x="143" y="68">H</text>
  <text x="200" y="167">H</text>
  <text x="83" y="167">H</text>
  <!-- H labels - back -->
  <text x="187" y="67">H</text>
  <text x="98" y="67">H</text>
  <text x="143" y="205">H</text>
  <!-- Front carbon dot -->
  <circle cx="150" cy="130" r="3" fill="black" stroke="none"/>
  <!-- Label -->
  <text x="100" y="240" font-size="15" font-weight="bold">Staggered (交叉式)</text>
  <text x="110" y="260" font-size="13" fill="green">E = 0 kJ/mol (most stable)</text>
  <!-- ECLIPSED (right) -->
  <!-- Back carbon circle -->
  <circle cx="420" cy="130" r="40" fill="white"/>
  <!-- Front carbon bonds (from center, 120° apart) -->
  <line x1="420" y1="130" x2="420" y2="75"/>
  <line x1="420" y1="130" x2="467" y2="157"/>
  <line x1="420" y1="130" x2="373" y2="157"/>
  <!-- Back carbon bonds (eclipsed - same angles as front, slightly offset for visibility) -->
  <line x1="416" y1="90" x2="416" y2="68"/>
  <line x1="458" y1="149" x2="475" y2="162"/>
  <line x1="382" y1="149" x2="365" y2="162"/>
  <!-- H labels - front -->
  <text x="413" y="68">H</text>
  <text x="470" y="167">H</text>
  <text x="353" y="167">H</text>
  <!-- H labels - back (slightly offset) -->
  <text x="400" y="63">H</text>
  <text x="477" y="172">H</text>
  <text x="345" y="172">H</text>
  <!-- Front carbon dot -->
  <circle cx="420" cy="130" r="3" fill="black" stroke="none"/>
  <!-- Label -->
  <text x="375" y="240" font-size="15" font-weight="bold">Eclipsed (重叠式)</text>
  <text x="370" y="260" font-size="13" fill="red">E = 12.5 kJ/mol (least stable)</text>
  <!-- Dihedral angle indicator -->
  <text x="200" y="285" font-size="12" fill="#555">Dihedral angle: 60° (staggered) vs 0° (eclipsed)</text>
</svg>